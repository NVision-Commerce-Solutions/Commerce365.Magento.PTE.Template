name: Initialize app.json

on:
  push:
    branches:
      - main

jobs:
  initialize:
    # Skip execution in the template repo
    if: github.event.repository.is_template == false

    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Client Name
        id: client
        shell: pwsh
        run: |
          $repoName = "${{ github.event.repository.name }}"

          # Optional prefix removal
          $clientName = $repoName -replace "^BC-App-", ""

          echo "clientName=$clientName" >> $env:GITHUB_OUTPUT

      - name: Run update script
        shell: pwsh
        run: |
          $scriptPath = Join-Path $PWD ".github/workflows/scripts/update-appjson.ps1"

          if (!(Test-Path $scriptPath)) {
              Write-Error "Script not found: $scriptPath"
              exit 1
          }

          & $scriptPath `
              -ClientName "${{ steps.client.outputs.clientName }}"

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app.json

          git commit -m "Initialize app.json" `
            || Write-Host "No changes to commit"

          git push