name: Initialize app.json

on:
  push:
    branches:
      - main

jobs:
  initialize:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Client Name
        id: client
        shell: pwsh
        run: |
          $repoName = "${{ github.event.repository.name }}"

          Write-Host "Repository name: $repoName"

          # OPTIONAL: Remove prefix if used
          # Example: Commerce365.Magento.PTE.Contoso -> Contoso
          $clientName = $repoName -replace "Commerce365.Magento.PTE.", ""

          Write-Host "Client name: $clientName"

          echo "clientName=$clientName" >> $env:GITHUB_OUTPUT

      - name: Update app.json
        shell: pwsh
        run: |
          ./scripts/update-appjson.ps1 `
            -ClientName "${{ steps.client.outputs.clientName }}"

      - name: Commit updated app.json
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app.json

          git commit -m "Initialize app.json" `
            || Write-Host "No changes to commit"

          git push